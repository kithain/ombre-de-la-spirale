<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirection…</title>
    <script>
      (function () {
        const redirectPath = window.location.pathname + window.location.search + window.location.hash;
        try {
          sessionStorage.setItem("redirect", redirectPath);
        } catch (err) {
          /* ignore storage failures */
        }
        const base = "/ombre-de-la-spirale/";
        window.location.replace(base);
      })();
    </script>
  </head>
  <body>
    <p>Redirection…</p>
  </body>
</html>
